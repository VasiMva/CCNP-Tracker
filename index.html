<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNP CLCOR 350-801 — Full Study Plan · 30 May 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f;--s1:#0b1120;--s2:#101a2c;--s3:#162035;
  --border:#1c2e44;--border2:#253a58;
  --blue:#0ea5e9;--teal:#22d3ee;--green:#34d399;
  --amber:#fbbf24;--red:#f87171;--violet:#a78bfa;--orange:#fb923c;
  --text:#dde6f0;--dim:#7a95b5;--muted:#3a5070;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.5}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:252px;flex-shrink:0;background:var(–s1);border-right:1px solid var(–border);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:50;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}

.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(–border)}
.sb-tag{font-family:var(–mono);font-size:9px;color:var(–blue);letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}
.sb-title{font-family:var(–display);font-size:17px;font-weight:800;color:#fff;line-height:1.2}
.sb-title span{color:var(–teal)}

.sb-countdown{margin:14px 16px 0;background:linear-gradient(135deg,rgba(14,165,233,.13),rgba(34,211,238,.06));border:1px solid rgba(14,165,233,.25);border-radius:8px;padding:12px;text-align:center}
.cd-num{font-family:var(–display);font-size:38px;font-weight:800;color:var(–teal);line-height:1}
.cd-lbl{font-family:var(–mono);font-size:9px;color:var(–dim);text-transform:uppercase;letter-spacing:.12em;margin-top:3px}

.sb-exam{margin:10px 16px 14px;background:rgba(251,191,36,.09);border:1px solid rgba(251,191,36,.28);border-radius:5px;padding:7px 10px;font-family:var(–mono);font-size:10px;color:var(–amber);text-align:center;letter-spacing:.04em}

.sb-prog{padding:0 16px 14px;border-bottom:1px solid var(–border)}
.sb-prog-head{display:flex;justify-content:space-between;font-family:var(–mono);font-size:9px;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.sb-track{height:4px;background:var(–border);border-radius:2px;overflow:hidden;margin-bottom:10px}
.sb-fill{height:100%;background:linear-gradient(90deg,var(–blue),var(–teal));border-radius:2px;transition:width .5s ease}
.sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sb-stat{background:var(–s2);border:1px solid var(–border);border-radius:5px;padding:7px;text-align:center}
.sb-stat-v{font-family:var(–mono);font-size:15px;color:var(–teal);line-height:1}
.sb-stat-l{font-size:9px;color:var(–muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* Week nav */
.wn{padding:10px 0 20px;flex:1}
.wn-ph{padding:8px 18px 3px;font-family:var(–mono);font-size:8px;color:var(–muted);text-transform:uppercase;letter-spacing:.12em}
.wn-item{display:flex;align-items:center;gap:8px;padding:6px 18px;cursor:pointer;border-left:2px solid transparent;font-size:11px;color:var(–dim);transition:all .15s;position:relative}
.wn-item:hover{background:var(–s2);color:var(–text)}
.wn-item.wna{background:rgba(14,165,233,.07);border-left-color:var(–blue);color:var(–text)}
.wn-dot{width:6px;height:6px;border-radius:50%;background:var(–muted);flex-shrink:0;transition:background .15s}
.wn-item.wna .wn-dot{background:var(–blue)}
.wn-item.ph2 .wn-dot{background:var(–teal)}
.wn-item.ph3 .wn-dot{background:var(–violet)}
.wn-item.ph4 .wn-dot{background:var(–amber)}
.wn-pct{margin-left:auto;font-family:var(–mono);font-size:9px;color:var(–muted)}
.wn-item.wna .wn-pct{color:var(–blue)}

/* ── MAIN ── */
.main{margin-left:252px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* Topbar */
.topbar{background:var(–s1);border-bottom:1px solid var(–border);padding:14px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
.tb-title{font-family:var(–display);font-size:19px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-title span{color:var(–teal)}
.tb-nav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-nav-btn{background:var(–s2);border:1px solid var(–border);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(–dim);font-size:14px;transition:all .15s;user-select:none}
.tb-nav-btn:hover{border-color:var(–blue);color:var(–blue)}
.tb-nav-btn:disabled{opacity:.3;cursor:default}
.tb-wnum{font-family:var(–mono);font-size:11px;color:var(–text);min-width:52px;text-align:center}
.tb-badge{font-family:var(–mono);font-size:10px;padding:3px 9px;border-radius:3px;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
.b-bl{background:rgba(14,165,233,.14);color:var(–blue);border:1px solid rgba(14,165,233,.2)}
.b-gn{background:rgba(52,211,153,.11);color:var(–green);border:1px solid rgba(52,211,153,.2)}
.b-am{background:rgba(251,191,36,.11);color:var(–amber);border:1px solid rgba(251,191,36,.2)}
.b-vt{background:rgba(167,139,250,.11);color:var(–violet);border:1px solid rgba(167,139,250,.2)}

/* Content */
.content{padding:24px 28px 80px;flex:1}

/* Phase banner */
.phase-banner{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:14px 18px;background:var(–s1);border:1px solid var(–border);border-radius:8px;animation:fadeUp .35s ease both}
.pb-color{width:4px;height:44px;border-radius:2px;flex-shrink:0}
.pb-sub{font-family:var(–mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.pb-title{font-family:var(–display);font-size:16px;font-weight:700;color:#fff}
.pb-desc{font-size:11px;color:var(–dim);margin-top:2px;line-height:1.4}
.pb-right{margin-left:auto;text-align:right;flex-shrink:0}
.pb-domain{font-family:var(–mono);font-size:9px;color:var(–dim);text-align:right;line-height:1.7}

/* Domain bar */
.dom-bar{display:flex;gap:2px;height:5px;border-radius:3px;overflow:hidden;margin-bottom:22px;animation:fadeUp .35s ease .05s both}
.dom-seg{height:100%;opacity:.22;transition:opacity .2s}
.dom-seg.on{opacity:1}

/* Week stats row */
.wk-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:22px;animation:fadeUp .35s ease .08s both}
.wk-stat{background:var(–s1);border:1px solid var(–border);border-radius:7px;padding:12px 10px;text-align:center}
.wk-stat-v{font-family:var(–mono);font-size:18px;color:var(–teal);line-height:1}
.wk-stat-l{font-size:9px;color:var(–dim);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}

/* Day grid - 7 columns */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px;animation:fadeUp .35s ease .12s both}

/* Day card */
.dc{background:var(–s1);border:1px solid var(–border);border-radius:8px;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer;min-height:160px;display:flex;flex-direction:column}
.dc:hover:not(.dc-rest){border-color:var(–border2)}
.dc.dc-open{border-color:var(–blue);box-shadow:0 0 0 1px rgba(14,165,233,.18),0 4px 24px rgba(14,165,233,.07)}
.dc.dc-done{border-color:rgba(52,211,153,.3)}
.dc.dc-rest{background:rgba(52,211,153,.03);border-color:rgba(52,211,153,.13);cursor:default;opacity:.8}
.dc.dc-exam{background:rgba(251,191,36,.04);border-color:rgba(251,191,36,.4);box-shadow:0 0 20px rgba(251,191,36,.07)}
.dc.dc-today{border-color:rgba(14,165,233,.5);box-shadow:0 0 0 1px rgba(14,165,233,.25)}

.dc-head{padding:9px 10px 7px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dc-dow{font-family:var(–mono);font-size:9px;color:var(–muted);text-transform:uppercase;letter-spacing:.08em}
.dc.dc-rest .dc-dow{color:var(–green)}
.dc.dc-open .dc-dow{color:var(–blue)}
.dc.dc-today .dc-dow::after{content:’ ·TODAY’;color:var(–blue)}
.dc-circle{width:15px;height:15px;border-radius:50%;border:1.5px solid var(–muted);display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent;flex-shrink:0;transition:all .15s}
.dc.dc-done .dc-circle{background:var(–green);border-color:var(–green);color:var(–bg)}

.dc-body{padding:9px 10px 10px;flex:1;display:flex;flex-direction:column;gap:5px}
.dc-topic{font-size:10.5px;font-weight:500;color:var(–text);line-height:1.35}
.dc.dc-rest .dc-topic{color:var(–green);font-size:11px}
.dc-hrs{font-family:var(–mono);font-size:8px;color:var(–muted);margin-top:1px}
.dc-mini{display:flex;flex-direction:column;gap:3px;margin-top:6px;flex:1}
.dc-mi{display:flex;align-items:flex-start;gap:4px;font-size:9px;color:var(–dim);cursor:pointer;line-height:1.3}
.dc-mb{width:9px;height:9px;border:1px solid var(–muted);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:6px;color:transparent;margin-top:1px;transition:all .1s}
.dc-mi.done .dc-mb{background:var(–green);border-color:var(–green);color:var(–bg)}
.dc-mi.done .dc-mt{text-decoration:line-through;text-decoration-color:var(–muted);color:var(–muted)}
.dc-prog{height:2px;background:var(–border);border-radius:1px;margin-top:auto;overflow:hidden}
.dc-prog-f{height:100%;background:linear-gradient(90deg,var(–blue),var(–teal));border-radius:1px;transition:width .3s}

/* Expand panel */
.ep{display:none;background:var(–s2);border:1px solid var(–border2);border-radius:10px;padding:22px;margin-bottom:20px;animation:fadeUp .22s ease both}
.ep.open{display:block}
.ep-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.ep-htxt{flex:1}
.ep-title{font-family:var(–display);font-size:17px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:6px}
.ep-meta{display:flex;flex-wrap:wrap;gap:6px}
.ep-x{background:var(–s3);border:1px solid var(–border);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(–dim);font-size:14px;flex-shrink:0;transition:all .15s}
.ep-x:hover{border-color:var(–red);color:var(–red)}

.ep-sessions{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:14px}
.ep-sess{background:var(–s3);border:1px solid var(–border);border-radius:8px;padding:13px}
.ep-sh{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ep-si{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.si-study{background:rgba(14,165,233,.15)}
.si-lab{background:rgba(52,211,153,.12)}
.si-review{background:rgba(251,191,36,.12)}
.si-mock{background:rgba(167,139,250,.14)}
.ep-sname{font-size:11px;font-weight:600;color:var(–text);flex:1}
.ep-sdur{font-family:var(–mono);font-size:9px;color:var(–dim)}

.ep-tasks{list-style:none;display:flex;flex-direction:column;gap:5px}
.ep-t{display:flex;align-items:flex-start;gap:7px;cursor:pointer;font-size:11.5px;color:var(–dim);line-height:1.4;transition:color .1s}
.ep-t:hover{color:var(–text)}
.ep-tb{width:13px;height:13px;border:1.5px solid var(–muted);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:7px;color:transparent;transition:all .12s}
.ep-t.done .ep-tb{background:var(–green);border-color:var(–green);color:var(–bg)}
.ep-t.done .ep-txt{text-decoration:line-through;text-decoration-color:var(–muted);color:var(–muted)}
.ep-tags{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.etag{font-family:var(–mono);font-size:7px;padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.07em}
.etag-cisco{background:rgba(14,165,233,.12);color:var(–blue)}
.etag-lab{background:rgba(52,211,153,.1);color:var(–green)}
.etag-review{background:rgba(251,191,36,.1);color:var(–amber)}
.etag-aws{background:rgba(251,146,60,.12);color:var(–orange)}
.etag-devnet{background:rgba(167,139,250,.12);color:var(–violet)}
.etag-mock{background:rgba(167,139,250,.15);color:var(–violet)}

.ep-res{border-top:1px solid var(–border);padding-top:12px;margin-top:12px}
.ep-rl{font-family:var(–mono);font-size:8px;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.ep-rg{display:flex;flex-wrap:wrap;gap:5px}
.ep-ri{font-size:10px;color:var(–blue);background:rgba(14,165,233,.07);border:1px solid rgba(14,165,233,.17);padding:4px 9px;border-radius:4px;font-family:var(–mono);cursor:pointer;transition:background .12s;display:inline-flex;align-items:center;gap:3px}
.ep-ri:hover{background:rgba(14,165,233,.14)}

.ep-tip{background:rgba(14,165,233,.05);border-left:3px solid var(–blue);border-radius:0 6px 6px 0;padding:9px 13px;margin-top:12px;font-size:11.5px;color:var(–dim);line-height:1.6}
.ep-tip strong{color:var(–teal)}

.ep-notes{margin-top:12px}
.ep-nl{font-family:var(–mono);font-size:8px;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.ep-ta{width:100%;background:var(–s1);border:1px solid var(–border);border-radius:6px;padding:9px 11px;font-family:var(–mono);font-size:11px;color:var(–text);resize:vertical;min-height:54px;outline:none;transition:border-color .15s}
.ep-ta:focus{border-color:var(–blue)}
.ep-ta::placeholder{color:var(–muted)}

/* Week overview panel */
.wk-overview{background:var(–s1);border:1px solid var(–border);border-radius:8px;padding:16px 18px;margin-bottom:20px;animation:fadeUp .35s ease .16s both}
.wo-title{font-family:var(–mono);font-size:9px;color:var(–muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px}
.wo-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wo-day{text-align:center;padding:8px 4px;border-radius:6px;border:1px solid var(–border);cursor:pointer;transition:all .15s}
.wo-day:hover:not(.wo-rest){border-color:var(–border2)}
.wo-day.wo-open{border-color:var(–blue);background:rgba(14,165,233,.06)}
.wo-day.wo-done{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.04)}
.wo-day.wo-rest{cursor:default;opacity:.6}
.wo-day.wo-today{border-color:rgba(14,165,233,.45)}
.wo-dow{font-family:var(–mono);font-size:8px;color:var(–muted);text-transform:uppercase;margin-bottom:3px}
.wo-date{font-family:var(–mono);font-size:10px;color:var(–text);margin-bottom:5px}
.wo-icon{font-size:14px;margin-bottom:3px}
.wo-p{height:3px;background:var(–border);border-radius:2px;overflow:hidden;margin-top:4px}
.wo-pf{height:100%;background:var(–green);border-radius:2px}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(–s2);border:1px solid var(–green);border-radius:6px;padding:9px 15px;font-family:var(–mono);font-size:11px;color:var(–green);opacity:0;transform:translateY(8px);transition:all .28s;z-index:1001;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media(max-width:1100px){.day-grid{grid-template-columns:repeat(4,1fr)}.wo-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.wk-stats{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.day-grid{grid-template-columns:repeat(2,1fr)}.wo-grid{grid-template-columns:repeat(2,1fr)}.content{padding:16px 14px 60px}.topbar{padding:12px 14px}}
</style>

</head>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-tag">350-801 CLCOR v2.0</div>
    <div class="sb-title">CCNP <span>Collab</span></div>
  </div>
  <div class="sb-countdown">
    <div class="cd-num" id="cd">—</div>
    <div class="cd-lbl">Days to Exam</div>

      <div class="tb-nav-btn" id="btn-prev" title="Previous week">&#8592;</div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
const EXAM_DATE = new Date('2026-05-30');

const PHASES = [
  {id:'p1',label:'Phase 1',name:'Foundation — Infrastructure & Protocols',color:'#0ea5e9',weeks:[1,2,3],domains:[1,2],
   desc:'Domains 1.0 Infrastructure (15%) + 2.0 Protocols & Codecs (20%). 35% of exam. Builds on your CCNA base.'},
  {id:'p2',label:'Phase 2',name:'Core UC Solutions & Cloud',color:'#22d3ee',weeks:[4,5,6],domains:[3,4],
   desc:'Domains 3.0 UC Solutions (20%) + 4.0 Cloud Collab (12%). 32% of exam. CUCM features, CUC, Jabber, Webex.'},
  {id:'p3',label:'Phase 3',name:'Design, Migration & Troubleshooting',color:'#a78bfa',weeks:[7],domains:[5,6],
   desc:'Domains 5.0 Infrastructure Design (17%) + 6.0 Migration & Troubleshooting (16%). 33% of exam.'},
  {id:'p4',label:'Phase 4',name:'Revision, Mock Exams & Final Prep',color:'#fbbf24',weeks:[8,9,10,11],domains:[1,2,3,4,5,6],
   desc:'All domains. Full revision, 6 timed mock exams, weak-area targeting, exam-day strategy.'},
];

const DOMAINS = [
  {id:1,name:'Infrastructure',w:15,c:'#0ea5e9'},
  {id:2,name:'Protocols & Codecs',w:20,c:'#22d3ee'},
  {id:3,name:'UC Solutions',w:20,c:'#34d399'},
  {id:4,name:'Cloud Collab',w:12,c:'#a78bfa'},
  {id:5,name:'Infra Design',w:17,c:'#fb923c'},
  {id:6,name:'Migration & Troubleshoot',w:16,c:'#fbbf24'},
];

// Week start dates (Sat): W1=Mar14, W2=Mar21, ... W11=May23
const WEEK_STARTS = [
  '2026-03-14','2026-03-21','2026-03-28',
  '2026-04-04','2026-04-11','2026-04-18',
  '2026-04-25','2026-05-02','2026-05-09',
  '2026-05-16','2026-05-23'
];

const DOW = ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'];

function dateStr(weekIdx, dayIdx) {
  const base = new Date(WEEK_STARTS[weekIdx]);
  const d = new Date(base);
  d.setDate(d.getDate() + dayIdx);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).replace(' ','‑');
}

function isToday(weekIdx, dayIdx) {
  const base = new Date(WEEK_STARTS[weekIdx]);
  const d = new Date(base);
  d.setDate(d.getDate() + dayIdx);
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let ST = {};
let CW = 1; // current week
let openDay = null;

function load() {
  try { const s=localStorage.getItem('clcor_v3'); if(s) ST=JSON.parse(s); } catch(e){}
}
function save() {
  try { localStorage.setItem('clcor_v3',JSON.stringify(ST)); } catch(e){}
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),1400);
}

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function weekTasks(w) {
  let tot=0,don=0;
  w.days.forEach(d=>d.sessions.forEach(s=>s.tasks.forEach(t=>{tot++;if(ST[t.id])don++;})));
  return {tot,don};
}

function globalStats() {
  let tot=0,don=0,hrs=0;
  WEEKS.forEach(w=>{
    const {tot:t,don:d}=weekTasks(w);
    tot+=t;don+=d;
    w.days.forEach(day=>{
      if(day.type!=='rest'){
        const allDone=day.sessions.every(s=>s.tasks.every(t=>ST[t.id]));
        if(allDone)hrs+=day.hours;
      }
    });
  });
  return {tot,don,hrs};
}

function phaseOf(wNum) { return PHASES.find(p=>p.weeks.includes(wNum)); }

function dayProgress(day) {
  if(day.sessions.length===0) return {tot:0,don:0};
  let tot=0,don=0;
  day.sessions.forEach(s=>s.tasks.forEach(t=>{tot++;if(ST[t.id])don++;}));
  return {tot,don};
}

// ─────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────
function buildSidebar() {
  const {tot,don,hrs}=globalStats();
  const pct=tot>0?Math.round(don/tot*100):0;
  document.getElementById('sbpct').textContent=pct+'%';
  document.getElementById('sbfill').style.width=pct+'%';
  document.getElementById('sbtasks').textContent=don;
  document.getElementById('sbhours').textContent=hrs+'h';

  const wn=document.getElementById('wn');
  wn.innerHTML='';
  PHASES.forEach(ph=>{
    const sec=document.createElement('div');
    sec.className='wn-ph';
    sec.textContent=ph.label+' — '+ph.name.split(' — ')[0];
    wn.appendChild(sec);
    ph.weeks.forEach(wNum=>{
      const w=WEEKS.find(x=>x.num===wNum);
      if(!w) return;
      const {tot,don}=weekTasks(w);
      const pct=tot>0?Math.round(don/tot*100):0;
      const item=document.createElement('div');
      item.className='wn-item ph'+ph.id.replace('p','')+(CW===wNum?' wna':'');
      item.innerHTML=`<div class="wn-dot"></div><span>W${wNum} · ${w.title.split(':')[0].slice(0,24)}</span><span class="wn-pct">${pct}%</span>`;
      item.addEventListener('click',()=>{ CW=wNum; openDay=null; render(); });
      wn.appendChild(item);
    });
  });
}

// ─────────────────────────────────────────
// COUNTDOWN
// ─────────────────────────────────────────
function updateCountdown() {
  const now=new Date();
  const diff=Math.ceil((EXAM_DATE-now)/(1000*60*60*24));
  document.getElementById('cd').textContent=Math.max(0,diff);
  document.getElementById('tb-days').textContent=Math.max(0,diff)+' days left';
}

// ─────────────────────────────────────────
// RENDER WEEK
// ─────────────────────────────────────────
function render() {
  const w=WEEKS.find(x=>x.num===CW);
  if(!w) return;
  const ph=phaseOf(CW);

  // Topbar
  document.getElementById('tbtitle').innerHTML=`Week ${CW} <span>${w.title}</span>`;
  document.getElementById('tb-wnum').textContent=`Week ${CW} / 11`;
  document.getElementById('tb-phase').textContent=ph.label;
  document.getElementById('btn-prev').disabled=CW===1;
  document.getElementById('btn-next').disabled=CW===11;

  buildSidebar();

  const content=document.getElementById('content');
  content.innerHTML='';

  // Phase banner
  const {tot,don}=weekTasks(w);
  const wPct=tot>0?Math.round(don/tot*100):0;
  const studyDays=w.days.filter(d=>d.type!=='rest').length;

  const banner=document.createElement('div');
  banner.className='phase-banner';
  banner.innerHTML=`
    <div class="pb-color" style="background:${ph.color}"></div>
    <div>
      <div class="pb-sub" style="color:${ph.color}">${ph.label} — ${ph.name}</div>
      <div class="pb-title">${w.title}</div>
      <div class="pb-desc">${ph.desc}</div>
    </div>
    <div class="pb-right">
      <div class="pb-domain">${w.domain}</div>
    </div>`;
  content.appendChild(banner);

  // Domain bar
  const domBar=document.createElement('div');
  domBar.className='dom-bar';
  DOMAINS.forEach(d=>{
    const seg=document.createElement('div');
    seg.className='dom-seg'+(ph.domains.includes(d.id)?' on':'');
    seg.style.cssText=`flex:${d.w};background:${d.c}`;
    seg.title=`${d.name} (${d.w}%)`;
    domBar.appendChild(seg);
  });
  content.appendChild(domBar);

  // Week stats
  const stats=document.createElement('div');
  stats.className='wk-stats';
  [
    {v:studyDays,l:'Study Days',c:'var(--blue)'},
    {v:w.days.reduce((a,d)=>a+d.hours,0)+'h',l:'Total Hours',c:'var(--teal)'},
    {v:don+'/'+tot,l:'Tasks',c:'var(--green)'},
    {v:wPct+'%',l:'Week Progress',c:'var(--amber)'},
    {v:'Wk '+CW+'/11',l:'Overall',c:'var(--violet)'},
  ].forEach(s=>{
    stats.innerHTML+=`<div class="wk-stat"><div class="wk-stat-v" style="color:${s.c}">${s.v}</div><div class="wk-stat-l">${s.l}</div></div>`;
  });
  content.appendChild(stats);

  // Week overview mini-calendar
  const wo=document.createElement('div');
  wo.className='wk-overview';
  wo.innerHTML='<div class="wo-title">📅 Week at a Glance — click a day to jump to it</div>';
  const wog=document.createElement('div');
  wog.className='wo-grid';
  const weekIdx=CW-1;
  w.days.forEach((day,di)=>{
    const {tot,don}=dayProgress(day);
    const allDone=tot>0&&don===tot;
    const today=isToday(weekIdx,di);
    const isOpen=openDay===`${CW}_${di}`;
    const d=document.createElement('div');
    d.className='wo-day'+(day.type==='rest'?' wo-rest':'')+(allDone?' wo-done':'')+(today?' wo-today':'')+(isOpen?' wo-open':'');
    d.innerHTML=`
      <div class="wo-dow">${DOW[di]}</div>
      <div class="wo-date">${dateStr(weekIdx,di)}</div>
      <div class="wo-icon">${day.type==='rest'?'🌿':tot===0?'—':allDone?'✅':'📖'}</div>
      ${tot>0?`<div class="wo-p"><div class="wo-pf" style="width:${Math.round(don/tot*100)}%"></div></div>`:''}`;
    if(day.type!=='rest'){
      d.addEventListener('click',()=>{
        openDay=openDay===`${CW}_${di}`?null:`${CW}_${di}`;
        render();
        setTimeout(()=>{
          const ep=document.getElementById('ep_'+CW+'_'+di);
          if(ep) ep.scrollIntoView({behavior:'smooth',block:'nearest'});
        },50);
      });
    }
    wog.appendChild(d);
  });
  wo.appendChild(wog);
  content.appendChild(wo);

  // Day grid
  const grid=document.createElement('div');
  grid.className='day-grid';
  w.days.forEach((day,di)=>{
    grid.appendChild(buildDayCard(day,di,weekIdx,CW));
    // Expanded panel inserted after the last card in grid row
  });
  content.appendChild(grid);

  // Expanded panel (outside grid, below)
  const epHolder=document.createElement('div');
  epHolder.id='ep-holder';
  w.days.forEach((day,di)=>{
    const ep=buildExpandPanel(day,di,weekIdx,CW);
    epHolder.appendChild(ep);
  });
  content.appendChild(epHolder);
}

// ─────────────────────────────────────────
// DAY CARD
// ─────────────────────────────────────────
function buildDayCard(day,di,weekIdx,wNum) {
  const {tot,don}=dayProgress(day);
  const allDone=tot>0&&don===tot;
  const today=isToday(weekIdx,di);
  const isOpen=openDay===`${wNum}_${di}`;
  const pct=tot>0?Math.round(don/tot*100):0;

  const card=document.createElement('div');
  card.className='dc'+(day.type==='rest'?' dc-rest':'')+(allDone?' dc-done':'')+(isOpen?' dc-open':'')+(today?' dc-today':'');
  if(day.type==='exam') card.classList.add('dc-exam');

  if(day.type==='rest'){
    card.innerHTML=`
      <div class="dc-head"><span class="dc-dow">${DOW[di]} · ${dateStr(weekIdx,di)}</span></div>
      <div class="dc-body">
        <div class="dc-topic">${day.topic}</div>
        <div class="dc-hrs">No study</div>
      </div>`;
    return card;
  }

  // Mini tasks (first 4 across all sessions)
  let miniTasks=[];
  day.sessions.forEach(s=>s.tasks.forEach(t=>{if(miniTasks.length<4)miniTasks.push(t);}));

  card.innerHTML=`
    <div class="dc-head">
      <span class="dc-dow">${DOW[di]} · ${dateStr(weekIdx,di)}</span>
      <div class="dc-circle">${allDone?'✓':''}</div>
    </div>
    <div class="dc-body">
      <div class="dc-topic">${day.topic}</div>
      <div class="dc-hrs">${day.hours}h · ${don}/${tot} tasks</div>
      <div class="dc-mini">
        ${miniTasks.map(t=>`
          <div class="dc-mi ${ST[t.id]?'done':''}" data-tid="${t.id}">
            <div class="dc-mb">${ST[t.id]?'✓':''}</div>
            <span class="dc-mt">${t.x.slice(0,42)}${t.x.length>42?'…':''}</span>
          </div>`).join('')}
      </div>
      <div class="dc-prog"><div class="dc-prog-f" style="width:${pct}%"></div></div>
    </div>`;

  // Click card body → open expand panel
  card.addEventListener('click',(e)=>{
    if(e.target.closest('.dc-circle')){
      // Mark all / unmark all
      const done=!allDone;
      day.sessions.forEach(s=>s.tasks.forEach(t=>{ST[t.id]=done;}));
      save();render();return;
    }
    if(e.target.closest('.dc-mi')){
      const tid=e.target.closest('.dc-mi').dataset.tid;
      if(tid){ST[tid]=!ST[tid];save();render();return;}
    }
    openDay=openDay===`${wNum}_${di}`?null:`${wNum}_${di}`;
    render();
    setTimeout(()=>{
      const ep=document.getElementById('ep_'+wNum+'_'+di);
      if(ep&&ep.classList.contains('open')) ep.scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  });

  return card;
}

// ─────────────────────────────────────────
// EXPAND PANEL
// ─────────────────────────────────────────
function buildExpandPanel(day,di,weekIdx,wNum) {
  const isOpen=openDay===`${wNum}_${di}`;
  const {tot,don}=dayProgress(day);

  const ep=document.createElement('div');
  ep.className='ep'+(isOpen?' open':'');
  ep.id=`ep_${wNum}_${di}`;

  if(!isOpen) return ep;

  ep.innerHTML=`
    <div class="ep-head">
      <div class="ep-htxt">
        <div class="ep-title">${day.topic}</div>
        <div class="ep-meta">
          <span class="tb-badge b-bl">${DOW[di]} · ${dateStr(weekIdx,di)}</span>
          <span class="tb-badge b-gn">${day.hours}h</span>
          <span class="tb-badge b-am">${don}/${tot} tasks</span>
        </div>
      </div>
      <div class="ep-x" id="epx_${wNum}_${di}">✕</div>
    </div>
    <div class="ep-sessions">
      ${day.sessions.map(s=>`
        <div class="ep-sess">
          <div class="ep-sh">
            <div class="ep-si si-${s.t}">${s.i}</div>
            <span class="ep-sname">${s.n}</span>
            <span class="ep-sdur">${s.d}</span>
          </div>
          <ul class="ep-tasks">
            ${s.tasks.map(t=>`
              <li class="ep-t ${ST[t.id]?'done':''}" data-eptid="${t.id}">
                <div class="ep-tb">${ST[t.id]?'✓':''}</div>
                <div>
                  <span class="ep-txt">${t.x}</span>
                  <div class="ep-tags">${t.tags.map(g=>`<span class="etag etag-${g}">${g}</span>`).join('')}</div>
                </div>
              </li>`).join('')}
          </ul>
        </div>`).join('')}
    </div>
    ${day.res.length?`
    <div class="ep-res">
      <div class="ep-rl">📚 Resources</div>
      <div class="ep-rg">${day.res.map(r=>`<span class="ep-ri">↗ ${r}</span>`).join('')}</div>
    </div>`:''}
    <div class="ep-tip">💡 <strong>Tutor Tip:</strong> ${day.tip}</div>
    <div class="ep-notes">
      <div class="ep-nl">📝 Your Notes</div>
      <textarea class="ep-ta" data-nid="${wNum}_${di}" placeholder="Key takeaways, commands, config snippets…">${ST['notes_'+wNum+'_'+di]||''}</textarea>

```
</div>`;
```

// Close button
ep.querySelector(`#epx_${wNum}_${di}`).addEventListener(‘click’,()=>{
openDay=null;render();
});

// Task checkboxes
ep.querySelectorAll(’.ep-t’).forEach(el=>{
el.addEventListener(‘click’,()=>{
const id=el.dataset.eptid;
ST[id]=!ST[id];
save();render();
});
});

// Notes
ep.querySelector(’.ep-ta’).addEventListener(‘input’,e=>{
ST[‘notes_’+wNum+’_’+di]=e.target.value;
save();
});

return ep;
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
function detectCurrentWeek() {
const today=new Date();
let found=1;
WEEK_STARTS.forEach((ws,i)=>{
const s=new Date(ws);
const e=new Date(s);
e.setDate(e.getDate()+6);
if(today>=s&&today<=e) found=i+1;
else if(today>e&&i<10) found=Math.min(i+2,11);
});
return found;
}

load();
CW=detectCurrentWeek();
updateCountdown();
setInterval(updateCountdown,60000);

document.getElementById(‘btn-prev’).addEventListener(‘click’,()=>{
if(CW>1){CW–;openDay=null;render();}
});
document.getElementById(‘btn-next’).addEventListener(‘click’,()=>{
if(CW<11){CW++;openDay=null;render();}
});

render();
</script>
